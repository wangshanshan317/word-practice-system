    <!-- 备用CDN - 使用多个CDN提高可用性 -->
    <script>
        // CDN故障转移机制
        const CDN_URLS = [
            'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
            'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
            'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js'
        ];

        let loadXLSXSuccess = false;

        function loadScriptWithFallback(urls, index = 0) {
            if (index >= urls.length) {
                console.error('所有CDN均加载失败');
                showNotification('⚠️ 网络连接问题，Excel功能暂时不可用<br><br>建议：<br>1. 检查网络连接<br>2. 稍后刷新重试<br>3. 使用学习包功能替代');
                return;
            }

            const script = document.createElement('script');
            script.src = urls[index];
            script.onerror = () => {
                console.warn(`CDN ${index + 1} 加载失败，尝试下一个...`);
                loadScriptWithFallback(urls, index + 1);
            };
            script.onload = () => {
                console.log(`XLSX库加载成功 (CDN ${index + 1})`);
                loadXLSXSuccess = true;
            };
            document.head.appendChild(script);
        }

        // 开始加载
        loadScriptWithFallback(CDN_URLS);

        // ========== 安全工具函数 ==========
        // HTML转义函数，防止XSS攻击
        function escapeHTML(str) {
            if (typeof str !== 'string') return str;
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // 安全的HTML内容设置
        function safeSetHTML(element, content) {
            if (typeof content === 'string') {
                element.innerHTML = content;
            } else {
                element.textContent = content;
            }
        }

        // 文件大小格式化
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
    </script>

<body>
    <!-- 网络状态提示 -->

        <h2 style="text-align: center; color: #333; font-size: 20px; margin: 10px 0;">单词跟读练习系统</h2>

            <span id="status">请导入学习包</span>
        </div>

        <div class="exercise-section hidden" id="exerciseContainer">

                <div class="word-display" id="wordDisplay">机器人七轴</div>

    <script>
        // ========== 音频系统初始化（安卓Chrome优化） ==========

        // 音频系统初始化状态
        let audioSystemInitialized = false;
        let isInitializingAudio = false;
        let audioInitPromise = null;
        let userInteracted = false;

        // 网络状态监控
        let networkOnline = navigator.onLine;

        // 资源清理管理
        let audioContext = null;
        let mediaStream = null;

        // 安卓Chrome语音合成优化变量
        let speechSynthesisReady = false;
        let voicesLoaded = false;
        let speechRetryCount = 0;
        const MAX_SPEECH_RETRIES = 3;

        // 通知系统
        function showNotification(message, title = '提示') {
            document.getElementById('notificationTitle').textContent = title;
            document.getElementById('notificationMessage').innerHTML = message;
            document.getElementById('notificationOverlay').classList.remove('hidden');
        }

        function hideNotification() {
            document.getElementById('notificationOverlay').classList.add('hidden');
        }

        // 监听页面加载
        window.addEventListener('load', function() {
            console.log('📱 页面加载完成，设备检测:', detectDevice());
            
            // 预加载语音合成系统（安卓Chrome需要预热）
            preloadSpeechSynthesis();

            // 检查XLSX库加载状态
            setTimeout(function() {
                if (!loadXLSXSuccess) {
                    console.warn('XLSX库可能加载失败，但继续运行');
                }

                // 隐藏加载动画
                document.getElementById('loadingOverlay').classList.add('hidden');

                // 恢复localStorage数据
                restoreFromLocalStorage();

            }, 2000);
        });

        // 检测设备和浏览器
        function detectDevice() {
            const ua = navigator.userAgent;
            const isAndroid = /Android/i.test(ua);
            const isChrome = /Chrome/i.test(ua);
            const isSafari = /Safari/i.test(ua) && !/Chrome/i.test(ua);
            const isIOS = /iPhone|iPad|iPod/i.test(ua);
            
            return {
                isAndroid,
                isChrome,
                isSafari,
                isIOS,
                isMobile: isAndroid || isIOS,
                browser: isChrome ? 'Chrome' : (isSafari ? 'Safari' : 'Other')
            };
        }

        // 预加载语音合成系统（安卓Chrome专用）
        function preloadSpeechSynthesis() {
            const device = detectDevice();
            
            if (!('speechSynthesis' in window)) {
                console.warn('⚠️ 当前浏览器不支持语音合成');
                return;
            }

            const synth = window.speechSynthesis;
            
            // 安卓Chrome需要触发语音加载

        // ========== 语音合成系统初始化 ==========

        // 初始化语音合成（安卓Chrome优化）
        function initSpeechSynthesis() {
            return new Promise((resolve, reject) => {
                if (!('speechSynthesis' in window)) {
                    reject(new Error('浏览器不支持语音合成'));
                    return;
                }

                const synth = window.speechSynthesis;
                const device = detectDevice();
                
                console.log('🎤 初始化语音合成，设备:', device);

                // 安卓Chrome需要更长的初始化时间
                const initTimeout = device.isAndroid ? 3000 : 2000;

                // 加载语音列表
                const loadVoices = () => {
                    const voices = synth.getVoices();
                    console.log('🔊 可用语音数量:', voices.length);
                    
                    if (voices.length > 0) {
                        voicesLoaded = true;
                        speechSynthesisReady = true;
                        console.log('✅ 语音系统就绪');
                        
                        // 安卓Chrome：使用空语音触发首次播放
                        if (device.isAndroid) {
                            try {
                                const testUtterance = new SpeechSynthesisUtterance('');
                                testUtterance.volume = 0;
                                synth.speak(testUtterance);
                                synth.cancel();
                            } catch (e) {
                                console.log('语音预热跳过');
                            }
                        }
                        
                        resolve(true);
                    } else {
                        console.warn('⚠️ 语音列表为空，等待加载...');
                    }
                };

                // 立即尝试加载
                loadVoices();

                // 监听语音加载事件
                synth.onvoiceschanged = () => {
                    console.log('🔊 语音列表已更新');
                    if (!voicesLoaded) {
                        loadVoices();
                    }
                };

                // 超时保护
                setTimeout(() => {
                    if (!voicesLoaded) {
                        console.warn('⚠️ 语音加载超时，使用系统默认');
                        voicesLoaded = true;
                        speechSynthesisReady = true;
                        resolve(true); // 即使超时也继续，使用默认语音
                    }
                }, initTimeout);
            });
        }

        // ========== 按需音频系统初始化 ==========

        // 移除全局点击事件监听器（原空白处触发逻辑）

        // 初始化音频系统（按需调用）
        function initAudioSystem() {
            // 如果已经初始化或正在初始化中，直接返回Promise
            if (audioSystemInitialized) {
                return Promise.resolve(true);
            }

            // 如果正在初始化，返回现有的Promise
            if (isInitializingAudio && audioInitPromise) {
                return audioInitPromise;
            }

            // 开始初始化流程
            isInitializingAudio = true;
            console.log('开始按需初始化音频系统...');

            audioInitPromise = new Promise((resolve, reject) => {
                try {
                    // 1. 初始化语音合成
                    initSpeechSynthesis()
                        .then(() => {
                            console.log('✅ 音频系统初始化完成');
                            audioSystemInitialized = true;
                            isInitializingAudio = false;
                            resolve(true);
                        })
                        .catch(err => {
                            console.error('❌ 音频系统初始化失败:', err);
                            isInitializingAudio = false;
                            audioInitPromise = null;
                            reject(err);
                        });

                } catch (error) {
                    console.error('音频系统初始化异常:', error);
                    isInitializingAudio = false;
                    audioInitPromise = null;
                    reject(error);
                }
            });

            return audioInitPromise;
        }

        // 统一音频功能入口（带状态提示）
        async function ensureAudioInitialized(actionType) {
            // 如果已经初始化，直接返回
            if (audioSystemInitialized) {
                return true;
            }

            // 显示初始化状态提示
            let statusMessage = '';
            switch(actionType) {
                case 'read_word':
                    statusMessage = '🔊 正在初始化音频系统...<br><br>准备朗读单词';
                    break;
                case 'read_sentence':
                    statusMessage = '🔊 正在初始化音频系统...<br><br>准备朗读句子';
                    break;
                case 'record':
                    statusMessage = '🎤 正在初始化音频系统...<br><br>准备录音功能';
                    break;
                default:
                    statusMessage = '🔊 正在初始化音频系统...';
            }

            // 显示轻量级状态提示（使用loadingOverlay，但移除audioInitOverlay）
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.querySelector('.loading-text');
            loadingText.textContent = '正在初始化音频系统...';
            loadingOverlay.classList.remove('hidden');

            try {

        // 从localStorage恢复数据
        function restoreFromLocalStorage() {
            try {
                const savedData = localStorage.getItem('wordPracticeData');
                if (savedData) {
                    const data = JSON.parse(savedData);

                    // 检查数据版本和过期时间（3天）
                    const lastSave = new Date(data.lastSaveTime);
                    const now = new Date();
                    const daysDiff = (now - lastSave) / (1000 * 60 * 60 * 24);

                    if (daysDiff > 3) {
                        console.log('保存的数据已过期（超过3天），清除旧数据');
                        localStorage.removeItem('wordPracticeData');
                        showNotification('📅 学习数据已过期<br><br>超过3天的数据已自动清除，请重新导入学习包');
                        return;
                    }

                    // 数据验证和恢复
                    if (data.userInfo && typeof data.userInfo === 'object') {
                        userInfo = {
                            name: sanitizeString(data.userInfo.name) || '',
                            dept: sanitizeString(data.userInfo.dept) || '',
                            position: sanitizeString(data.userInfo.position) || ''
                        };

                        if (userInfo.name) {
                            document.getElementById('displayUserName').textContent =
                                `${userInfo.name} - ${userInfo.dept} - ${userInfo.position}`;
                        }
                    }

                    if (data.wordData && Array.isArray(data.wordData) && data.wordData.length > 0) {
                        // 验证和清理单词数据
                        wordData = data.wordData.filter(item =>
                            item && typeof item === 'object' &&
                            typeof item.word === 'string' &&
                            typeof item.meaning === 'string'
                        ).map(item => ({
                            word: sanitizeString(item.word),
                            meaning: sanitizeString(item.meaning),
                            sentence: sanitizeString(item.sentence || ''),
                            sentenceTranslation: sanitizeString(item.sentenceTranslation || '')
                        }));

                        if (wordData.length > 0) {
                            currentIndex = Math.min(Math.max(0, data.currentIndex || 0), wordData.length - 1);
                            learningRecords = Array.isArray(data.learningRecords) ? data.learningRecords : [];
                            currentRecord = data.currentRecord || {};
                            totalLearningTime = Math.max(0, data.totalLearningTime || 0);

                            document.getElementById('status').textContent =
                                `已恢复学习进度：${wordData.length} 个单词`;
                            document.getElementById('progressText').textContent =
                                `${currentIndex + 1}/${wordData.length}`;
                            document.getElementById('exerciseContainer').classList.remove('hidden');

                                showCurrentWord();
                            }

                            console.log('数据已从localStorage恢复，共 ' + wordData.length + ' 个单词');
                        }
                    }
                }
            } catch (error) {
                console.error('从localStorage恢复数据失败:', error);
                // 数据损坏时清除
                localStorage.removeItem('wordPracticeData');
            }
        }

        function loadExcelFile() {
            // 检查XLSX库是否已加载
            if (typeof XLSX === 'undefined') {
                showNotification('⚠️ Excel加载库未就绪<br><br>请稍后重试，或使用学习包功能替代');
                return;
            }

            const fileInput = document.getElementById('excelFile');
            const file = fileInput.files[0];

            if (!file) {
                showNotification('⚠️ 请先选择Excel文件');
                return;
            }

            // 文件类型验证
            const validTypes = [
                'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
                'application/vnd.ms-excel',
                'application/octet-stream'
            ];
            if (!validTypes.includes(file.type) && !file.name.match(/\.(xlsx|xls)$/i)) {
                showNotification('⚠️ 文件格式不正确<br><br>请上传.xlsx或.xls格式的Excel文件');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: ['word', 'meaning', 'sentence', 'sentenceTranslation'] });

                    // 数据验证和清理
                    wordData = jsonData.filter(item =>
                        item && typeof item === 'object' &&
                        item.word && item.meaning &&
                        typeof item.word === 'string' &&
                        typeof item.meaning === 'string' &&
                        item.word !== '英文' &&
                        item.meaning !== '专业词汇（中文）'
                    ).map(item => ({
                        word: sanitizeString(item.word),
                        meaning: sanitizeString(item.meaning),
                        sentence: sanitizeString(item.sentence || ''),
                        sentenceTranslation: sanitizeString(item.sentenceTranslation || '')
                    })).filter(item => item.word && item.meaning);

                    if (wordData.length === 0) {
                        showNotification('⚠️ Excel文件中没有有效的单词数据<br><br>请检查文件格式和内容');
                        return;
                    }

                    learningRecords = [];
                    currentIndex = 0;
                    isCorrect = false;
                    currentState = 'word_input';
                    sentenceRecorded = false;
                    initCurrentRecord();

                    document.getElementById('status').textContent = `已加载 ${wordData.length} 个单词`;
                    document.getElementById('progressText').textContent = `1/${wordData.length}`;
                    document.getElementById('jumpInput').max = wordData.length;
                    document.getElementById('exerciseContainer').classList.remove('hidden');

                    startLearningTimer();

                    showCurrentWord();

                    // 保存到localStorage
                    saveToLocalStorage();

                    showNotification('✅ Excel加载成功<br><br>共加载 ' + wordData.length + ' 个单词');
                } catch (error) {
                    console.error('加载Excel失败:', error);
                    showNotification('⚠️ 加载Excel失败<br><br>' + escapeHTML(error.message));
                }
            };
            reader.onerror = function() {
                showNotification('⚠️ 文件读取失败<br><br>请检查文件是否损坏');
            };
            reader.readAsArrayBuffer(file);
        }

            if (currentWord.sentenceTranslation && currentWord.sentenceTranslation.trim() !== '') {
                const translationHtml = `<small>翻译: ${escapeHTML(currentWord.sentenceTranslation)}</small>`;

        function generateSentence(word) {
            for (const [keyword, templates] of Object.entries(wordTemplates)) {
                if (word.toLowerCase().includes(keyword)) {
                    return templates[Math.floor(Math.random() * templates.length)];
                }
            }
            return generalTemplates[Math.floor(Math.random() * generalTemplates.length)];
        }

        // ========== 麦克风权限持久化管理 ==========

        // 初始化麦克风（只执行一次，保持持久化）
        async function initMicrophone() {
            // 如果已经授权且已有流，直接返回
            if (microphonePermissionGranted && persistentMediaStream) {
                return persistentMediaStream;
            }

            // 如果正在初始化，返回现有的Promise
            if (microphoneInitPromise) {
                return microphoneInitPromise;
            }

            // 开始初始化
            microphoneInitPromise = new Promise((resolve, reject) => {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    const errorMsg = '❌ 当前环境不支持录音功能<br><br>' +
                                   '💡 解决方案：<br>' +
                                   '1. 在手机浏览器中打开使用（推荐Safari或Chrome）<br>' +
                                   '2. 或跳过录音功能，直接进行默写练习<br>' +
                                   '3. 录音功能在电脑浏览器中可正常使用';
                    showNotification(errorMsg);
                    microphoneInitPromise = null;
                    reject(new Error('不支持录音功能'));
                    return;
                }

                const recordStatus = document.getElementById('recordStatus');
                if (recordStatus) {
                    recordStatus.textContent = '正在请求麦克风权限...';
                }

                // Android兼容性：配置音频约束
                const audioConstraints = {
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                };

                navigator.mediaDevices.getUserMedia(audioConstraints)
                    .then(stream => {
                        console.log('✅ 麦克风权限已获取，保持持久化');
                        persistentMediaStream = stream;
                        microphonePermissionGranted = true;
                        microphoneInitPromise = null;
                        
                        if (recordStatus) {
                            recordStatus.textContent = '麦克风已就绪';
                        }
                        
                        resolve(stream);
                    })
                    .catch(err => {
                        console.error('麦克风权限请求失败:', err);
                        microphoneInitPromise = null;
                        microphonePermissionGranted = false;
                        
                        let errorMsg = '❌ 无法访问麦克风<br><br>';

                        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                            errorMsg += '原因：麦克风权限被拒绝<br><br>' +
                                       '💡 解决方案：<br>' +
                                       '1. Chrome浏览器：点击地址栏左侧的🔒图标，找到麦克风权限选项，选择"允许"<br>' +
                                       '2. Safari浏览器：点击地址栏左侧的🔒图标，选择"麦克风"权限，点击"允许"<br>' +
                                       '3. 刷新页面后重试<br>' +
                                       '4. 如果问题仍存在，请尝试在手机浏览器中使用<br><br>' +
                                       '如果你不需要录音功能，可以直接进行默写练习。';
                        } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                            errorMsg += '原因：未找到麦克风设备<br><br>' +
                                       '💡 解决方案：<br>' +
                                       '1. 检查设备麦克风是否正常<br>' +
                                       '2. 尝试重启设备<br>' +
                                       '3. 如果设备有麦克风但仍无法使用，请使用手机浏览器进行练习';
                        } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                            errorMsg += '原因：麦克风被其他应用占用<br><br>' +
                                       '💡 解决方案：<br>' +
                                       '1. 关闭其他可能使用麦克风的应用<br>' +
                                       '2. 刷新页面后重试<br>' +
                                       '3. 如果问题仍存在，请使用手机浏览器进行练习';
                        } else {
                            errorMsg += '原因：' + escapeHTML(err.message) + '<br><br>' +
                                       '💡 建议：<br>' +
                                       '1. 在手机浏览器中打开使用<br>' +
                                       '2. 或跳过录音功能，直接进行默写练习';
                        }

                        if (recordStatus) {
                            recordStatus.textContent = '麦克风访问失败';
                        }
                        
                        showNotification(errorMsg);
                        reject(err);
                    });
            });

            return microphoneInitPromise;
        }

        // 释放麦克风资源（仅在页面卸载或用户主动退出时调用）
        function releaseMicrophone() {
            if (persistentMediaStream) {
                persistentMediaStream.getTracks().forEach(track => {
                    track.stop();
                    console.log('已释放麦克风轨道');
                });
                persistentMediaStream = null;
            }
            microphonePermissionGranted = false;
            microphoneInitPromise = null;

        async function toggleRecording() {
            // 按需初始化音频系统
            const initialized = await ensureAudioInitialized('record');
            if (!initialized) {
                const errorMsg = '❌ 音频系统初始化失败<br><br>' +
                               '无法使用录音功能，请刷新页面后重试<br><br>' +
                               '或者直接进行默写练习。';
                showNotification(errorMsg);
                return;
            }

            const recordBtn = document.getElementById('recordBtn');
            const playBtn = document.getElementById('playBtn');
            const recordStatus = document.getElementById('recordStatus');

            if (!isRecording) {
                try {
                    // 获取麦克风流（首次会请求权限，后续使用已授权的流）
                    const stream = await initMicrophone();
                    
                    // 保存媒体流引用，用于清理
                    mediaStream = stream;

                    // Android兼容性：优先选择支持的格式
                    let mimeType = 'audio/webm';
                    const supportedMimeTypes = [
                        'audio/webm;codecs=opus',
                        'audio/webm',
                        'audio/ogg;codecs=opus',
                        'audio/mp4',
                        'audio/mpeg',
                        'audio/aac'
                    ];

                    for (const type of supportedMimeTypes) {
                        if (MediaRecorder.isTypeSupported(type)) {
                            mimeType = type;
                            console.log('使用录音格式:', mimeType);
                            break;
                        }
                    }

                    currentAudioMimeType = mimeType;

                    // Android兼容性：设置MediaRecorder参数
                    const options = mimeType ? { mimeType } : {};
                    try {
                        mediaRecorder = new MediaRecorder(stream, options);
                    } catch (e) {
                        // 某些Android设备不支持特定mimeType，使用默认配置
                        console.warn('无法使用指定格式，使用默认配置:', e);
                        mediaRecorder = new MediaRecorder(stream);
                    }

                    audioChunks = [];

                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data && e.data.size > 0) {
                            audioChunks.push(e.data);
                        }
                    };

                    mediaRecorder.onstop = () => {
                        currentRecord.sentenceRecorded = true;
                        recordBtn.textContent = '重录';
                        recordBtn.classList.remove('recording');
                        playBtn.disabled = false;
                        recordStatus.textContent = '录音完成';
                        isRecording = false;
                        sentenceRecorded = true;

                        // 录音完成后，启用进入默写和下一个单词按钮
                        document.getElementById('nextAfterDictationBtn').disabled = false;

                        // 保存到localStorage
                        saveToLocalStorage();
                    };

                    mediaRecorder.onerror = (event) => {
                        console.error('录音错误:', event.error);
                        recordStatus.textContent = '录音出错';
                        isRecording = false;
                        recordBtn.classList.remove('recording');
                        showNotification('⚠️ 录音出现问题<br><br>请重试或使用默写功能');
                    };

                    // 开始录音
                    try {
                        mediaRecorder.start(100); // 每100ms触发一次ondataavailable
                        recordBtn.textContent = '停止';
                        recordBtn.classList.add('recording');
                        recordStatus.textContent = '录音中...';
                        isRecording = true;
                    } catch (e) {
                        console.error('启动录音失败:', e);
                        showNotification('⚠️ 录音启动失败<br><br>请尝试刷新页面后重试');
                    }

                } catch (error) {
                    console.error('获取麦克风失败:', error);
                    recordStatus.textContent = '麦克风访问失败';
                    isRecording = false;
                    // 错误已经在 initMicrophone 中处理过，这里不需要重复显示通知
                }
            } else {
                // 停止录音
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                    // 注意：不停止 persistentMediaStream，保持麦克风权限持久化
                    // 只在页面卸载或退出登录时才释放
                }
            }
        }

        function playRecording() {
            if (audioChunks.length === 0) {
                showNotification('⚠️ 还没有录音');
                return;
            }

            try {
                const mimeType = currentAudioMimeType || 'audio/webm';
                const audioBlob = new Blob(audioChunks, { type: mimeType });
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                const device = detectDevice();

                // 安卓Chrome优化：添加事件监听和错误处理
                audio.addEventListener('canplaythrough', function() {
                    audio.play().catch(err => {
                        console.error('播放失败:', err);
                        URL.revokeObjectURL(audioUrl);
                        
                        // 安卓Chrome特殊处理
                        if (device.isAndroid && device.isChrome) {
                            showNotification('⚠️ 安卓Chrome播放失败<br><br>请尝试以下方法：<br>1. 刷新页面后重试<br>2. 确保录音已完成<br>3. 检查音频文件是否损坏');
                        } else {
                            showNotification('⚠️ 播放录音失败');
                        }
                    });
                });

                // 如果音频已经就绪，直接播放
                if (audio.readyState >= 2) {
                    audio.play().catch(err => {
                        console.error('播放失败:', err);
                        URL.revokeObjectURL(audioUrl);
                        showNotification('⚠️ 播放录音失败');
                    });
                }

                audio.onended = () => {
                    URL.revokeObjectURL(audioUrl); // 释放URL对象
                    document.getElementById('recordStatus').textContent = '录音完成';
                };

                audio.onerror = () => {
                    console.error('播放错误，详细信息:', audio.error);
                    URL.revokeObjectURL(audioUrl);
                    
                    // 检查音频数据是否有效
                    const totalSize = audioChunks.reduce((sum, chunk) => sum + chunk.size, 0);
                    console.log('录音总大小:', totalSize, 'bytes');
                    
                    if (totalSize === 0) {
                        showNotification('⚠️ 录音文件为空<br><br>请重新录音');
                    } else if (totalSize < 100) {
                        showNotification('⚠️ 录音文件过小<br><br>录音时间可能太短，请重新录音');
                    } else {
                        showNotification('⚠️ 播放录音失败<br><br>文件大小: ' + formatFileSize(totalSize) + '<br><br>请重新录音');
                    }
                };

                document.getElementById('recordStatus').textContent = '准备播放...';
            } catch (error) {
                console.error('播放录音异常:', error);
                showNotification('⚠️ 播放录音时发生错误');
            }
        }

            console.log('🎵 开始朗读单词');

            // 检查是否有单词数据
            if (!wordData || !wordData[currentIndex]) {
                console.error('❌ 没有可朗读的单词数据');

                return;
            }

            const currentWord = wordData[currentIndex].word;
            console.log('📖 准备朗读:', currentWord);

            // 检查浏览器支持
            if (!('speechSynthesis' in window)) {
                console.error('❌ 浏览器不支持语音合成');
                showNotification('⚠️ 您的设备不支持语音播放功能<br><br>请使用其他浏览器或设备');
                return;
            }

            const synth = window.speechSynthesis;
            
            // 安全获取设备信息
            let device;
            try {
                device = detectDevice();
            } catch (e) {
                console.warn('设备检测失败，使用默认配置');
                device = { isAndroid: false, isChrome: false };
            }

            // 安卓Chrome优化：完全重置语音系统
            if (device.isAndroid && device.isChrome) {
                console.log('📱 安卓Chrome：执行语音系统重置');
                synth.cancel();
                // 等待确保cancel完成
                await new Promise(resolve => setTimeout(resolve, 150));
            } else {
                // 其他设备：停止当前播放
                if (synth.speaking) {
                    console.log('⏸️ 停止当前播放');
                    synth.cancel();
                }
            }

            // 检查语音系统是否就绪
            const voices = synth.getVoices();
            console.log('🎤 可用语音数量:', voices.length);
            if (voices.length > 0) {
                console.log('🎤 部分语音:', voices.slice(0, 5).map(v => v.name));
            }

            // 创建语音合成请求
            const utterance = new SpeechSynthesisUtterance(currentWord);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;

            // 语音选择和播放
            const loadAndSpeak = () => {
                const allVoices = synth.getVoices();
                console.log('🔊 加载语音，总数:', allVoices.length);

                // 优先选择英语语音
                let enUSVoice = allVoices.find(voice =>
                    voice.lang === 'en-US' &&
                    (voice.name.includes('Google') || voice.name.includes('US English') || voice.name.includes('Samantha'))
                );

                // 备选方案1：任意英语语音
                if (!enUSVoice) {
                    enUSVoice = allVoices.find(voice => voice.lang.startsWith('en'));
                }

                // 备选方案2：任意语音（防止无法播放）
                if (!enUSVoice && allVoices.length > 0) {
                    enUSVoice = allVoices[0];
                    console.warn('⚠️ 未找到英语语音，使用默认语音:', enUSVoice.name);
                }

                if (enUSVoice) {
                    utterance.voice = enUSVoice;
                    console.log('✅ 使用语音:', enUSVoice.name, '语言:', enUSVoice.lang);
                } else {
                    console.warn('⚠️ 没有找到可用语音，使用系统默认');
                }

                // 添加事件监听
                utterance.onstart = () => {
                    console.log('▶️ 开始朗读');
                };

                utterance.onend = () => {
                    console.log('✅ 朗读完成');
                };

                utterance.onerror = (event) => {
                    console.error('❌ 朗读错误:', event.error);
                    
                    // 所有平台都忽略canceled和interrupted错误（这是正常的）
                    if (event.error === 'canceled' || event.error === 'interrupted') {
                        console.log('语音被中断，正常情况，不显示错误提示');
                        return;
                    }
                    
                    // 只有真正的错误才显示提示
                    showNotification('⚠️ 朗读失败: ' + event.error);
                };

                // 开始播放（安卓Chrome需要特殊处理）
                try {
                    if (device && device.isAndroid && device.isChrome) {
                        // 安卓Chrome：先执行预热
                        const warmUpUtterance = new SpeechSynthesisUtterance('');
                        warmUpUtterance.volume = 0;
                        warmUpUtterance.rate = utterance.rate;
                        warmUpUtterance.pitch = utterance.pitch;
                        
                        try {
                            synth.speak(warmUpUtterance);
                            synth.cancel();
                            
                            // 等待预热完成
                            setTimeout(() => {
                                synth.speak(utterance);
                                console.log('✅ 安卓Chrome开始朗读');
                            }, 200);
                        } catch (e) {
                            console.log('预热失败，直接播放');
                            synth.speak(utterance);
                        }
                    } else {
                        synth.speak(utterance);
                    }
                } catch (e) {
                    console.error('❌ 播放异常:', e);
                    showNotification('⚠️ 朗读失败，请重试');
                }
            };

            // 立即尝试加载语音
            if (voices.length === 0) {
                console.log('⏳ 等待语音加载...');
                synth.onvoiceschanged = () => {
                    console.log('✅ 语音已加载');
                    loadAndSpeak();
                };
                // 安卓Chrome需要更长的超时时间
                const timeoutDelay = (device && device.isAndroid) ? 5000 : 2000;
                setTimeout(() => {
                    if (synth.getVoices().length === 0) {
                        console.warn('⚠️ 语音加载超时，尝试直接播放');
                        loadAndSpeak();
                    }
                }, timeoutDelay);
            } else {
                // 安卓Chrome需要更长的延迟确保系统就绪
                const delayTime = (device && device.isAndroid) ? 300 : 100;
                setTimeout(loadAndSpeak, delayTime);
            }
        }

                console.log('🔊 加载语音，总数:', allVoices.length);

                // 优先选择英语语音
                let enUSVoice = allVoices.find(voice =>
                    voice.lang === 'en-US' &&
                    (voice.name.includes('Google') || voice.name.includes('US English') || voice.name.includes('Samantha'))
                );

                // 备选方案1：任意英语语音
                if (!enUSVoice) {
                    enUSVoice = allVoices.find(voice => voice.lang.startsWith('en'));
                }

                // 备选方案2：任意语音
                if (!enUSVoice && allVoices.length > 0) {
                    enUSVoice = allVoices[0];
                    console.warn('⚠️ 未找到英语语音，使用默认语音:', enUSVoice.name);
                }

                if (enUSVoice) {
                    utterance.voice = enUSVoice;
                    console.log('✅ 使用语音:', enUSVoice.name, '语言:', enUSVoice.lang);
                } else {
                    console.warn('⚠️ 没有找到可用语音，使用系统默认');
                }

                // 添加事件监听
                utterance.onstart = () => {
                    console.log('▶️ 开始朗读句子');
                };

                utterance.onend = () => {
                    console.log('✅ 句子朗读完成');
                };

                utterance.onerror = (event) => {
                    console.error('❌ 朗读错误:', event.error);
                    
                    // 所有平台都忽略canceled和interrupted错误（这是正常的）
                    if (event.error === 'canceled' || event.error === 'interrupted') {
                        console.log('语音被中断，正常情况，不显示错误提示');
                        return;
                    }
                    
                    // 只有真正的错误才显示提示
                    showNotification('⚠️ 朗读失败: ' + event.error);
                };

                // 开始播放（安卓Chrome需要特殊处理）
                try {
                    if (device && device.isAndroid && device.isChrome) {
                        // 安卓Chrome：先执行预热
                        const warmUpUtterance = new SpeechSynthesisUtterance('');
                        warmUpUtterance.volume = 0;
                        warmUpUtterance.rate = utterance.rate;
                        warmUpUtterance.pitch = utterance.pitch;
                        
                        try {
                            synth.speak(warmUpUtterance);
                            synth.cancel();
                            
                            // 等待预热完成
                            setTimeout(() => {
                                synth.speak(utterance);
                                console.log('✅ 安卓Chrome开始朗读句子');
                            }, 200);
                        } catch (e) {
                            console.log('预热失败，直接播放');
                            synth.speak(utterance);
                        }
                    } else {
                        synth.speak(utterance);
                    }
                } catch (e) {
                    console.error('❌ 播放异常:', e);
                    showNotification('⚠️ 朗读失败，请重试');
                }
            };

            // 立即尝试加载语音
            if (voices.length === 0) {
                console.log('⏳ 等待语音加载...');
                synth.onvoiceschanged = () => {
                    console.log('✅ 语音已加载');
                    loadAndSpeak();
                };
                // 安卓Chrome需要更长的超时时间
                const timeoutDelay = (device && device.isAndroid) ? 5000 : 2000;
                setTimeout(() => {
                    if (synth.getVoices().length === 0) {
                        console.warn('⚠️ 语音加载超时，尝试直接播放');
                        loadAndSpeak();
                    }
                }, timeoutDelay);
            } else {
                // 安卓Chrome需要更长的延迟确保系统就绪
                const delayTime = (device && device.isAndroid) ? 300 : 100;
                setTimeout(loadAndSpeak, delayTime);
            }
        }

        // Base64 编码函数
        function encodeBase64(str) {
            try {
                // 将字符串转换为 UTF-8 字节数组，然后编码为 Base64
                const utf8Bytes = encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,
                    function(match, p1) {
                        return String.fromCharCode('0x' + p1);
                    });
                return btoa(utf8Bytes);
            } catch (error) {
                console.error('Base64编码失败:', error);
                throw new Error('编码失败');
            }
        }

        // Base64 解码函数
        function decodeBase64(base64Str) {
            try {
                // 解码 Base64 并转换为 UTF-8 字符串
                const utf8Str = atob(base64Str);
                return decodeURIComponent(utf8Str.split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            } catch (error) {
                console.error('Base64解码失败:', error);
                throw new Error('解码失败，文件可能已损坏');
            }
        }

            if (!cleanTaskName) {

                return;
            }

            const packageData = {
                version: "v2.0",
                createTime: new Date().toISOString(),

            // 将 JSON 数据转换为 Base64 编码

                // 创建包含 Base64 数据的文件内容

            } catch (error) {

        function importLearningPackage() {

            if (!userInfo.name || !userInfo.dept || !userInfo.position) {
                showNotification('⚠️ 请先登录！<br><br>导入学习包前需要先登录系统<br><br>请点击"学员"菜单中的"登录"按钮进行登录');

            }

            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.learning';
            fileInput.onchange = async function(e) {
                const file = e.target.files[0];
                if (!file) return;

                // 文件大小验证
                if (file.size > 10 * 1024 * 1024) {
                    showNotification('⚠️ 文件过大<br><br>文件大小不能超过10MB');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        // 读取 Base64 编码的文件内容
                        const base64Content = e.target.result.trim();

                        // 解码 Base64 数据
                        const jsonData = decodeBase64(base64Content);
                        const packageData = JSON.parse(jsonData);

                        loadPackageData(packageData);
                    } catch (error) {
                        console.error('解析错误:', error);
                        showNotification('⚠️ 文件格式错误或已损坏<br><br>请确保使用正确的学习包文件(.learning)');
                    }
                };
                reader.onerror = function() {
                    showNotification('⚠️ 文件读取失败');
                };
                reader.readAsText(file);
            };
            fileInput.click();
        }

        function loadPackageData(packageData) {
            // 数据验证
            if (!packageData || typeof packageData !== 'object') {
                showNotification('⚠️ 学习包格式错误：无效的数据格式');
                return;
            }

            if (!packageData.wordData || !Array.isArray(packageData.wordData)) {
                showNotification('⚠️ 学习包格式错误：缺少单词数据！');
                return;
            }

            if (packageData.wordData.length === 0) {
                showNotification('⚠️ 学习包为空：没有单词数据');
                return;
            }

            // 验证和清理单词数据
            wordData = packageData.wordData.filter(item =>
                item && typeof item === 'object' &&
                typeof item.word === 'string' &&
                typeof item.meaning === 'string'
            ).map(item => ({
                word: sanitizeString(item.word),
                meaning: sanitizeString(item.meaning),
                sentence: sanitizeString(item.sentence || ''),
                sentenceTranslation: sanitizeString(item.sentenceTranslation || '')
            })).filter(item => item.word && item.meaning);

            if (wordData.length === 0) {
                showNotification('⚠️ 学习包中没有有效的单词数据');
                return;
            }

            currentTaskInfo = packageData.taskInfo || {};
            isLearningPackageMode = true;

                a.href = url;
                a.download = filename;
                document.body.appendChild(a);

        function startLearningTimer() {
            if (learningTimerInterval) {
                clearInterval(learningTimerInterval);
            }
            learningStartTime = Date.now();
            totalLearningTime = 0;

            learningTimerInterval = setInterval(() => {
                if (learningStartTime) {
                    const elapsed = Math.floor((Date.now() - learningStartTime) / 1000);
                    totalLearningTime = elapsed;
                }
            }, 1000);
        }

        function formatLearningTime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;

            if (hours > 0) {
                return `${hours}小时${minutes}分钟`;
            } else if (minutes > 0) {
                return `${minutes}分钟${secs}秒`;
            } else {
                return `${secs}秒`;
            }
        }

                        <h3>操作说明</h3>
                        <ol style="margin-left: 20px; line-height: 1.8; color: #555;">
                            <li>学员将学习记录上传到钉钉群文件夹"学习记录提交"</li>
                            <li>管理员点击"加载记录文件"选择多个JSON文件</li>
                            <li>系统自动统计并显示学员学习情况</li>
                            <li>可导出完整的监控报告</li>
                        </ol>
                    </div>

                    <div class="report-section">
                        <h3>学员学习记录</h3>
                        <div id="monitorRecordList" style="max-height: 400px; overflow-y: auto;">
                            <p style="text-align: center; color: #999; padding: 20px;">暂无学习记录，请先加载文件</p>
                        </div>
                    </div>

                    <div class="report-buttons">
                        <button onclick="loadMonitoringRecords()">📁 加载记录文件</button>
                        <button class="export" onclick="exportMonitoringReport()">📊 导出监控报告</button>
                        <button onclick="hideMonitoringDashboard()">🔙 返回练习</button>
                    </div>
                `;

                document.body.appendChild(dashboard);
            } else {
                dashboard.classList.remove('hidden');
            }
        }

        function hideMonitoringDashboard() {
            document.getElementById('monitoringDashboard').classList.add('hidden');
            document.getElementById('practiceContainer').classList.remove('hidden');
        }

        function loadMonitoringRecords() {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.multiple = true;
            fileInput.accept = '.json';
            fileInput.onchange = function(e) {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                // 文件大小验证
                const totalSize = files.reduce((sum, file) => sum + file.size, 0);
                if (totalSize > 50 * 1024 * 1024) { // 50MB
                    showNotification('⚠️ 文件总大小过大<br><br>请分批加载，每次不超过50MB');
                    return;
                }

                collectedRecords = [];
                let processedCount = 0;

                files.forEach(file => {
                    // 单个文件大小验证
                    if (file.size > 10 * 1024 * 1024) {
                        console.warn('跳过过大的文件:', file.name);
                        processedCount++;
                        if (processedCount === files.length) {
                            updateMonitoringDisplay();
                        }
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const record = JSON.parse(e.target.result);
                            // 数据验证
                            if (record && typeof record === 'object' &&
                                record.studentInfo && typeof record.studentInfo === 'object' &&
                                record.learningProgress && typeof record.learningProgress === 'object' &&
                                record.performance && typeof record.performance === 'object') {
                                collectedRecords.push(record);
                            } else {
                                console.warn('无效的学习记录格式:', file.name);
                            }
                        } catch (error) {
                            console.error('文件解析失败:', file.name, error);
                        }

                        processedCount++;
                        if (processedCount === files.length) {
                            updateMonitoringDisplay();
                        }
                    };
                    reader.onerror = function() {
                        console.error('文件读取失败:', file.name);
                        processedCount++;
                        if (processedCount === files.length) {
                            updateMonitoringDisplay();
                        }
                    };
                    reader.readAsText(file);
                });
            };
            fileInput.click();
        }

        function updateMonitoringDisplay() {
            if (collectedRecords.length === 0) {
                showNotification('⚠️ 未找到有效的学习记录文件！');
                return;
            }

            const submittedCount = collectedRecords.length;
            const avgAccuracy = collectedRecords.reduce((sum, r) => sum + (r.performance?.accuracy || 0), 0) / submittedCount;
            const avgTime = collectedRecords.reduce((sum, r) => sum + (r.learningProgress?.totalTime || 0), 0) / submittedCount;
            const avgCompletion = collectedRecords.reduce((sum, r) => sum + (r.learningProgress?.completionRate || 0), 0) / submittedCount;

            document.getElementById('monitorSubmittedCount').textContent = submittedCount + '人';
            document.getElementById('monitorAvgAccuracy').textContent = Math.round(avgAccuracy) + '%';
            document.getElementById('monitorAvgTime').textContent = Math.round(avgTime / 60) + '分钟';
            document.getElementById('monitorAvgCompletion').textContent = Math.round(avgCompletion) + '%';

            const recordList = document.getElementById('monitorRecordList');
            recordList.innerHTML = collectedRecords.map((record, index) => {
                const accuracy = record.performance?.accuracy || 0;
                const borderColor = accuracy >= 80 ? '#27ae60' : accuracy >= 60 ? '#f39c12' : '#e74c3c';
                const textColor = accuracy >= 80 ? '#27ae60' : accuracy >= 60 ? '#f39c12' : '#e74c3c';

                return `
                <div style="background: #f9f9f9; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 3px solid ${borderColor};">
                    <h4 style="margin: 0 0 8px 0; color: #2c3e50;">${escapeHTML(record.studentInfo?.name || '未知')} - ${escapeHTML(record.studentInfo?.department || '未知')}</h4>
                    <div style="font-size: 13px; color: #555; line-height: 1.6;">
                        <p><strong>岗位：</strong>${escapeHTML(record.studentInfo?.position || '未知')}</p>
                        <p><strong>进度：</strong>${record.learningProgress?.completedWords || 0}/${record.learningProgress?.totalWords || 0} (${record.learningProgress?.completionRate || 0}%)</p>
                        <p><strong>正确率：</strong><span style="color: ${textColor}; font-weight: bold;">${accuracy}%</span></p>
                        <p><strong>学习时长：</strong>${formatLearningTime(record.learningProgress?.totalTime || 0)}</p>
                        <p><strong>跟读完成：</strong>${record.performance?.recordingCount || 0}个 | <strong>默写完成：</strong>${record.performance?.dictationCount || 0}个</p>
                        <p><strong>提交时间：</strong>${record.submitTime ? new Date(record.submitTime).toLocaleString() : '未知'}</p>
                    </div>
                </div>
            `}).join('');

            showNotification('✅ 成功加载 ' + collectedRecords.length + ' 条学习记录！');
        }

        function exportMonitoringReport() {
            if (collectedRecords.length === 0) {
                showNotification('⚠️ 请先加载学习记录文件！');
                return;
            }

            // 检查XLSX库是否已加载
            if (typeof XLSX === 'undefined') {
                showNotification('⚠️ Excel导出库未就绪<br><br>请稍后重试');
                return;
            }

            try {
                const wb = XLSX.utils.book_new();

                const submittedCount = collectedRecords.length;
                const avgAccuracy = Math.round(collectedRecords.reduce((sum, r) => sum + (r.performance?.accuracy || 0), 0) / submittedCount);
                const avgTime = Math.round(collectedRecords.reduce((sum, r) => sum + (r.learningProgress?.totalTime || 0), 0) / submittedCount / 60);
                const avgCompletion = Math.round(collectedRecords.reduce((sum, r) => sum + (r.learningProgress?.completionRate || 0), 0) / submittedCount);

                const summaryData = [
                    ['学习监控报告'],
                    [''],
                    ['报告生成时间', new Date().toLocaleString()],
                    [''],
                    ['统计概览'],
                    ['已提交人数', submittedCount + '人'],
                    ['平均正确率', avgAccuracy + '%'],
                    ['平均学习时长', avgTime + '分钟'],
                    ['平均完成率', avgCompletion + '%'],
                    [''],
                    ['部门统计']
                ];

                const deptStats = {};
                collectedRecords.forEach(record => {
                    const dept = record.studentInfo?.department || '未知部门';
                    if (!deptStats[dept]) {
                        deptStats[dept] = { count: 0, totalAccuracy: 0, totalTime: 0 };
                    }
                    deptStats[dept].count++;
                    deptStats[dept].totalAccuracy += record.performance?.accuracy || 0;
                    deptStats[dept].totalTime += record.learningProgress?.totalTime || 0;
                });

                Object.keys(deptStats).forEach(dept => {
                    summaryData.push([
                        dept,
                        deptStats[dept].count + '人',
                        Math.round(deptStats[dept].totalAccuracy / deptStats[dept].count) + '%',
                        Math.round(deptStats[dept].totalTime / deptStats[dept].count / 60) + '分钟'
                    ]);
                });

                const summaryWS = XLSX.utils.aoa_to_sheet(summaryData);
                XLSX.utils.book_append_sheet(wb, summaryWS, '统计概览');

                const detailData = [
                    ['序号', '姓名', '部门', '岗位', '完成进度', '正确率', '学习时长', '跟读完成', '默写完成', '提交时间']
                ];

                collectedRecords.forEach((record, index) => {
                    detailData.push([
                        index + 1,
                        record.studentInfo?.name || '未知',
                        record.studentInfo?.department || '未知',
                        record.studentInfo?.position || '未知',
                        `${record.learningProgress?.completedWords || 0}/${record.learningProgress?.totalWords || 0} (${record.learningProgress?.completionRate || 0}%)`,
                        (record.performance?.accuracy || 0) + '%',
                        formatLearningTime(record.learningProgress?.totalTime || 0),
                        (record.performance?.recordingCount || 0) + '个',
                        (record.performance?.dictationCount || 0) + '个',
                        record.submitTime ? new Date(record.submitTime).toLocaleString() : '未知'
                    ]);
                });

                const detailWS = XLSX.utils.aoa_to_sheet(detailData);
                XLSX.utils.book_append_sheet(wb, detailWS, '详细记录');

                XLSX.writeFile(wb, `学习监控报告_${new Date().toLocaleDateString().replace(/\//g, '')}.xlsx`);

                showNotification('✅ 监控报告已导出！');
            } catch (error) {
                console.error('导出监控报告失败:', error);
                showNotification('⚠️ 导出监控报告失败<br><br>' + escapeHTML(error.message));
            }
        }

        // ========== 下拉菜单控制 ==========

        function toggleDropdown(dropdownId) {
            const dropdown = document.getElementById(dropdownId);
            const allDropdowns = document.querySelectorAll('.dropdown-content');

            allDropdowns.forEach(d => {
                if (d.id !== dropdownId) {
                    d.classList.remove('show');
                }
            });

            dropdown.classList.toggle('show');
        }

        document.addEventListener('click', function(event) {
            const dropdowns = document.querySelectorAll('.nav-dropdown');
            dropdowns.forEach(dropdown => {
                if (!dropdown.contains(event.target)) {
                    const content = dropdown.querySelector('.dropdown-content');
                    if (content) {
                        content.classList.remove('show');
                    }
                }
            });
        });
    </script>
</body>
</html>
