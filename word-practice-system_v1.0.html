    <!-- 预连接优化 -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <!-- 备用CDN - 使用多个CDN提高可用性 -->
    <script>
        // CDN故障转移机制
        const CDN_URLS = [
            'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
            'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
            'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js'
        ];
        
        let loadXLSXSuccess = false;
        
        function loadScriptWithFallback(urls, index = 0) {
            if (index >= urls.length) {
                console.error('所有CDN均加载失败');
                alert('⚠️ 网络连接问题，Excel功能暂时不可用\n\n建议：\n1. 检查网络连接\n2. 稍后刷新重试\n3. 使用学习包功能替代');
                return;
            }
            
            const script = document.createElement('script');
            script.src = urls[index];
            script.onerror = () => {
                console.warn(`CDN ${index + 1} 加载失败，尝试下一个...`);
                loadScriptWithFallback(urls, index + 1);
            };
            script.onload = () => {
                console.log(`XLSX库加载成功 (CDN ${index + 1})`);
                loadXLSXSuccess = true;
            };
            document.head.appendChild(script);
        }
        
        // 开始加载
        loadScriptWithFallback(CDN_URLS);
    </script>

<body>
    <!-- 网络状态提示 -->
    <div class="network-status" id="networkStatus">
        ⚠️ 网络连接不稳定，部分功能可能受影响
    </div>

    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在加载系统...</div>
    </div>

    <!-- 音频初始化提示 -->
    <div class="audio-init-overlay hidden" id="audioInitOverlay">
        <div class="audio-init-content">
            <h3>🎤 音频功能初始化</h3>
            <p>为了确保语音播放和录音功能正常工作，<br>我们需要初始化音频系统。</p>
            <button class="audio-init-btn" onclick="initAudioSystem()">点击初始化</button>
        </div>
    </div>

    <!-- 练习界面 -->
    <div class="modal-overlay hidden" id="loginModal">
        <div class="modal-content">
            <h3 class="modal-title">用户登录</h3>
            <div class="modal-form">
                <div class="form-group">
                    <label>姓名 *</label>
                    <input type="text" id="modalUserName" placeholder="请输入您的姓名">
                </div>
                <div class="form-group">
                    <label>部门 *</label>
                    <input type="text" id="modalUserDept" placeholder="请输入您的部门">
                </div>
                <div class="form-group">
                    <label>岗位 *</label>
                    <input type="text" id="modalUserPosition" placeholder="请输入您的岗位">
                </div>
                <div class="modal-buttons">
                    <button class="cancel-btn" onclick="closeLoginModal()">取消</button>
                    <button class="confirm-btn" onclick="confirmLoginModal()">确认登录</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 练习界面 -->
    <div class="container" id="practiceContainer">
        <input type="file" id="excelFile" accept=".xlsx, .xls" style="display: none;">

        <div class="top-nav">
            <div class="user-info">
                <span id="displayUserName"></span>
            </div>
            <div class="nav-buttons">
                <!-- 管理员下拉菜单 -->
                <div class="nav-dropdown">
                    <button class="dropdown-btn admin" onclick="toggleDropdown('adminDropdown')">
                        🛠️ 管理员 ▼
                    </button>
                    <div class="dropdown-content" id="adminDropdown">
                        <a onclick="document.getElementById('excelFile').click(); toggleDropdown('adminDropdown')">📁 加载Excel</a>
                        <a onclick="exportLearningPackage(); toggleDropdown('adminDropdown')">📦 导出学习包</a>
                        <a onclick="showMonitoringDashboard(); toggleDropdown('adminDropdown')">📊 监控面板</a>
                    </div>
                </div>

                <!-- 学员下拉菜单 -->
                <div class="nav-dropdown">
                    <button class="dropdown-btn student" onclick="toggleDropdown('studentDropdown')">
                        👤 学员 ▼
                    </button>
                    <div class="dropdown-content" id="studentDropdown">
                        <a onclick="showLoginModal(); toggleDropdown('studentDropdown')">🔑 登录</a>
                        <a onclick="importLearningPackage(); toggleDropdown('studentDropdown')">📥 导入学习包</a>
                        <a onclick="showReport(); toggleDropdown('studentDropdown')">📈 查看统计</a>
                        <a class="logout" onclick="logout(); toggleDropdown('studentDropdown')">🚪 退出</a>
                    </div>
                </div>
            </div>
        </div>
        
        <h2 style="text-align: center; color: #333; font-size: 20px; margin: 10px 0;">单词跟读练习系统</h2>

        <div class="status-bar">
            <span id="status">请加载Excel单词表</span>
        </div>

        <div class="exercise-section hidden" id="exerciseContainer">
            <div class="word-row">
                <div class="word-display" id="wordDisplay">机器人七轴</div>
                <div class="input-group">
                    <input type="text" id="answerInput" placeholder="请输入英文单词..." autocomplete="off">
                </div>
                <div class="jump-section">
                    <span id="progressText">0/0</span>
                    <input type="number" id="jumpInput" placeholder="跳转" min="1" max="1000">
                    <button onclick="jumpToWord()">跳转</button>
                </div>
            </div>

            <div class="button-group">
                <button class="action-btn voice" onclick="readWord()">朗读</button>
                <button class="action-btn" id="submitBtn" onclick="checkAnswer()">提交答案</button>
                <button class="action-btn hint" id="hintBtn" ontouchstart="showHint()" ontouchend="hideHint()" onmousedown="showHint()" onmouseup="hideHint()" onmouseleave="hideHint()">提示</button>
            </div>

            <div class="feedback" id="feedback"></div>
            
            <!-- 短句跟读 -->
            <div class="sentence-section hidden" id="sentenceExercise">
                <div class="section-title">跟读练习</div>
                <div class="sentence-display" id="sentenceDisplay"></div>
                <div class="recording-controls">
                    <button class="record-btn" id="recordBtn" onclick="toggleRecording()">录音</button>
                    <button class="play-btn" id="playBtn" onclick="playRecording()" disabled>回放</button>
                    <button class="play-btn voice" onclick="readSentence()">朗读句子</button>
                </div>
                <div class="record-status" id="recordStatus"></div>
                <div class="feedback" id="sentenceFeedback"></div>
                <div class="switch-section">
                    <button class="switch-btn" onclick="showDictation()">进入默写</button>
                </div>
            </div>

            <!-- 默写练习 -->
            <div class="sentence-section hidden" id="dictationExercise">
                <div class="section-title">默写练习</div>
                <div class="hint-text">点击"朗读句子"听音，然后默写</div>
                <div class="button-group" style="margin-bottom: 8px;">
                    <button class="action-btn voice" onclick="readSentence()">朗读句子</button>
                </div>
                <div class="input-group">
                    <textarea id="dictationInput" placeholder="请默写英文短句..." rows="3"></textarea>
                </div>
                <div class="button-group">
                    <button class="action-btn" id="dictationCheckBtn" onclick="checkDictation()">检查答案</button>
                    <button class="action-btn hint" id="dictationHintBtn" ontouchstart="showDictationHint()" ontouchend="hideDictationHint()" onmousedown="showDictationHint()" onmouseup="hideDictationHint()" onmouseleave="hideDictationHint()">显示答案</button>
                </div>
                <div class="feedback" id="dictationFeedback"></div>
                <div class="switch-section">
                    <button class="switch-btn gray" onclick="hideDictation()">返回跟读</button>
                </div>
            </div>
            
            <button class="action-btn next" id="nextBtn" onclick="nextWord()" disabled>下一个单词</button>
        </div>
    </div>

    <!-- 统计报告 -->
    <div class="report-container hidden" id="reportContainer">
        <div class="report-header">
            <h2>学习统计报告</h2>
            <p id="reportUserInfo"></p>
        </div>
        
        <div class="report-section">
            <h3>学习概况</h3>
            <div class="report-grid">
                <div class="report-item">
                    <strong>学习单词</strong>
                    <span id="reportTotalWords">0</span>
                </div>
                <div class="report-item">
                    <strong>正确率</strong>
                    <span id="reportAccuracy">0%</span>
                </div>
                <div class="report-item">
                    <strong>正确次数</strong>
                    <span id="reportCorrectCount">0</span>
                </div>
                <div class="report-item">
                    <strong>错误次数</strong>
                    <span id="reportIncorrectCount">0</span>
                </div>
            </div>
        </div>
        
        <div class="report-section">
            <h3>学习详情</h3>
            <table class="report-table">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>中文</th>
                        <th>英文</th>
                        <th>单词</th>
                        <th>跟读</th>
                        <th>默写</th>
                    </tr>
                </thead>
                <tbody id="reportTableBody">
                </tbody>
            </table>
        </div>
        
        <div class="report-buttons">
            <button onclick="hideReport()">返回练习</button>
            <button class="export" onclick="exportReport()">导出报告</button>
        </div>
    </div>

    <script>
        // ========== GitHub Pages 优化配置 ==========
        
        // 音频系统初始化状态
        let audioSystemInitialized = false;
        let userInteracted = false;
        
        // 网络状态监控
        let networkOnline = navigator.onLine;
        
        // 等待页面和资源加载完成
        window.addEventListener('load', function() {
            console.log('页面加载完成');
            
            // 检查XLSX库加载状态
            setTimeout(function() {
                if (!loadXLSXSuccess) {
                    console.warn('XLSX库可能加载失败，但继续运行');
                }
                
                // 隐藏加载动画
                document.getElementById('loadingOverlay').classList.add('hidden');
                
                // 恢复localStorage数据
                restoreFromLocalStorage();
                
            }, 2000);
        });
        
        // 监听网络状态变化
        window.addEventListener('online', function() {
            networkOnline = true;
            document.getElementById('networkStatus').classList.remove('show');
            console.log('网络已连接');
        });
        
        window.addEventListener('offline', function() {
            networkOnline = false;
            document.getElementById('networkStatus').classList.add('show');
            console.log('网络已断开');
        });
        
        // 监听用户首次交互
        document.addEventListener('click', function initAudioOnClick() {
            if (!userInteracted) {
                userInteracted = true;
                console.log('用户首次交互，可以播放音频');
                
                // 如果音频系统未初始化，显示初始化提示
                if (!audioSystemInitialized) {
                    document.getElementById('audioInitOverlay').classList.remove('hidden');
                }
                
                // 移除事件监听（只需要触发一次）
                document.removeEventListener('click', initAudioOnClick);
            }
        }, { once: true });
        
        // 初始化音频系统
        function initAudioSystem() {
            try {
                // 初始化语音合成
                if ('speechSynthesis' in window) {
                    const synth = window.speechSynthesis;
                    // 预加载语音
                    synth.getVoices();
                    console.log('语音合成初始化成功');
                }
                
                // 尝试初始化音频上下文（用于录音）
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    navigator.mediaDevices.getUserMedia({ audio: true })
                        .then(stream => {
                            stream.getTracks().forEach(track => track.stop());
                            console.log('麦克风权限获取成功');
                            audioSystemInitialized = true;
                        })
                        .catch(err => {
                            console.warn('麦克风权限未授予:', err);
                            audioSystemInitialized = false;
                        });
                }
                
                // 隐藏初始化提示
                document.getElementById('audioInitOverlay').classList.add('hidden');
                
                alert('✅ 音频系统初始化完成！\n\n现在可以使用语音播放和录音功能。');
                
            } catch (error) {
                console.error('音频系统初始化失败:', error);
                document.getElementById('audioInitOverlay').classList.add('hidden');
                alert('⚠️ 音频系统初始化失败\n\n录音功能可能不可用，但其他功能正常。');
            }
        }
        
        // ========== localStorage 数据持久化 ==========
        
        // 保存数据到localStorage
        function saveToLocalStorage() {
            try {
                const dataToSave = {
                    userInfo: userInfo,
                    wordData: wordData,
                    currentIndex: currentIndex,
                    learningRecords: learningRecords,
                    currentRecord: currentRecord,
                    totalLearningTime: totalLearningTime,
                    lastSaveTime: new Date().toISOString()
                };
                
                localStorage.setItem('wordPracticeData', JSON.stringify(dataToSave));
                console.log('数据已保存到localStorage');
            } catch (error) {
                console.error('保存到localStorage失败:', error);
                // 如果localStorage满了，尝试清除旧数据
                try {
                    localStorage.removeItem('wordPracticeData');
                    saveToLocalStorage();
                } catch (e) {
                    console.error('localStorage空间不足，无法保存数据');
                }
            }
        }
        
        // 从localStorage恢复数据
        function restoreFromLocalStorage() {
            try {
                const savedData = localStorage.getItem('wordPracticeData');
                if (savedData) {
                    const data = JSON.parse(savedData);
                    
                    // 检查数据是否过期（7天）
                    const lastSave = new Date(data.lastSaveTime);
                    const now = new Date();
                    const daysDiff = (now - lastSave) / (1000 * 60 * 60 * 24);
                    
                    if (daysDiff > 7) {
                        console.log('保存的数据已过期，清除旧数据');
                        localStorage.removeItem('wordPracticeData');
                        return;
                    }
                    
                    // 恢复数据
                    if (data.userInfo && data.userInfo.name) {
                        userInfo = data.userInfo;
                        document.getElementById('displayUserName').textContent = 
                            `${userInfo.name} - ${userInfo.dept} - ${userInfo.position}`;
                    }
                    
                    if (data.wordData && data.wordData.length > 0) {
                        wordData = data.wordData;
                        currentIndex = data.currentIndex || 0;
                        learningRecords = data.learningRecords || [];
                        currentRecord = data.currentRecord || {};
                        totalLearningTime = data.totalLearningTime || 0;
                        
                        document.getElementById('status').textContent = 
                            `已恢复学习进度：${wordData.length} 个单词`;
                        document.getElementById('progressText').textContent = 
                            `${currentIndex + 1}/${wordData.length}`;
                        document.getElementById('exerciseContainer').classList.remove('hidden');
                        
                        // 恢复当前单词
                        if (currentIndex < wordData.length) {
                            showCurrentWord();
                        }
                        
                        console.log('数据已从localStorage恢复');
                    }
                }
            } catch (error) {
                console.error('从localStorage恢复数据失败:', error);
            }
        }
        
        // 清除localStorage数据
        function clearLocalStorage() {
            try {
                localStorage.removeItem('wordPracticeData');
                console.log('localStorage数据已清除');
            } catch (error) {
                console.error('清除localStorage失败:', error);
            }
        }

        function loadExcelFile() {
            // 检查XLSX库是否已加载
            if (typeof XLSX === 'undefined') {
                alert('⚠️ Excel加载库未就绪\n\n请稍后重试，或使用学习包功能替代');
                return;
            }
            
            const fileInput = document.getElementById('excelFile');
            const file = fileInput.files[0];

            if (!file) {
                alert('请先选择Excel文件');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: ['word', 'meaning', 'sentence', 'sentenceTranslation'] });

                    wordData = jsonData.filter(item =>
                        item.word && item.meaning &&
                        item.word !== '英文' &&
                        item.meaning !== '专业词汇（中文）'
                    ).map(item => ({
                        word: item.word,
                        meaning: item.meaning,
                        sentence: item.sentence || '',
                        sentenceTranslation: item.sentenceTranslation || ''
                    }));

                    learningRecords = [];
                    currentIndex = 0;
                    isCorrect = false;
                    currentState = 'word_input';
                    sentenceRecorded = false;
                    initCurrentRecord();

                    document.getElementById('status').textContent = `已加载 ${wordData.length} 个单词`;
                    document.getElementById('progressText').textContent = `1/${wordData.length}`;
                    document.getElementById('jumpInput').max = wordData.length;
                    document.getElementById('exerciseContainer').classList.remove('hidden');

                    startLearningTimer();

                    showCurrentWord();
                    
                    // 保存到localStorage
                    saveToLocalStorage();
                } catch (error) {
                    alert('加载Excel失败: ' + error.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function generateSentence(word) {
            for (const [keyword, templates] of Object.entries(wordTemplates)) {
                if (word.toLowerCase().includes(keyword)) {
                    return templates[Math.floor(Math.random() * templates.length)];
                }
            }
            return generalTemplates[Math.floor(Math.random() * generalTemplates.length)];
        }

        function toggleRecording() {
            // 检查音频系统是否已初始化
            if (!audioSystemInitialized) {
                const errorMsg = '❌ 音频系统未初始化\n\n' +
                               '💡 解决方案：\n' +
                               '1. 请先点击页面任意位置初始化音频系统\n' +
                               '2. 或跳过录音功能，直接进行默写练习';
                alert(errorMsg);
                return;
            }
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                const errorMsg = '❌ 当前环境不支持录音功能\n\n' +
                               '💡 解决方案：\n' +
                               '1. 在手机浏览器中打开使用（推荐Safari或Chrome）\n' +
                               '2. 或跳过录音功能，直接进行默写练习\n' +
                               '3. 录音功能在电脑浏览器中可正常使用';
                alert(errorMsg);
                return;
            }

            const recordBtn = document.getElementById('recordBtn');
            const playBtn = document.getElementById('playBtn');
            const recordStatus = document.getElementById('recordStatus');

            if (!isRecording) {
                recordStatus.textContent = '正在请求麦克风权限...';

                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        let mimeType = 'audio/webm';
                        const supportedMimeTypes = [
                            'audio/webm',
                            'audio/webm;codecs=opus',
                            'audio/ogg;codecs=opus',
                            'audio/mp4',
                            'audio/mpeg'
                        ];

                        for (const type of supportedMimeTypes) {
                            if (MediaRecorder.isTypeSupported(type)) {
                                mimeType = type;
                                break;
                            }
                        }

                        currentAudioMimeType = mimeType;
                        const options = mimeType ? { mimeType } : {};
                        mediaRecorder = new MediaRecorder(stream, options);
                        audioChunks = [];

                        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);

                        mediaRecorder.onstop = () => {
                            currentRecord.sentenceRecorded = true;
                            recordBtn.textContent = '重录';
                            recordBtn.classList.remove('recording');
                            playBtn.disabled = false;
                            recordStatus.textContent = '录音完成';
                            isRecording = false;
                            sentenceRecorded = true;
                            
                            // 保存到localStorage
                            saveToLocalStorage();
                        };

                        mediaRecorder.start();
                        recordBtn.textContent = '停止';
                        recordBtn.classList.add('recording');
                        recordStatus.textContent = '录音中...';
                        isRecording = true;
                    })
                    .catch(err => {
                        console.error('录音错误:', err);
                        let errorMsg = '❌ 无法访问麦克风\n\n';

                        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                            errorMsg += '原因：麦克风权限被拒绝\n\n' +
                                       '💡 解决方案：\n' +
                                       '1. 检查浏览器设置，允许访问麦克风\n' +
                                       '2. 刷新页面后重试\n' +
                                       '3. 在手机浏览器中打开使用';
                        } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                            errorMsg += '原因：未找到麦克风设备\n\n' +
                                       '💡 解决方案：\n' +
                                       '1. 检查设备麦克风是否正常\n' +
                                       '2. 尝试重启设备';
                        } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                            errorMsg += '原因：麦克风被其他应用占用\n\n' +
                                       '💡 解决方案：\n' +
                                       '1. 关闭其他可能使用麦克风的应用\n' +
                                       '2. 刷新页面后重试';
                        } else {
                            errorMsg += '原因：' + err.message + '\n\n' +
                                       '💡 建议：\n' +
                                       '1. 在手机浏览器中打开使用\n' +
                                       '2. 或跳过录音功能，直接进行默写练习';
                        }

                        alert(errorMsg);
                        recordStatus.textContent = '录音失败';
                        isRecording = false;
                    });
            } else {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                    mediaRecorder.stream.getTracks().forEach(track => track.stop());
                }
            }
        }

        function playRecording() {

        function readWord() {
            // 检查音频系统是否已初始化
            if (!audioSystemInitialized) {
                alert('请先点击页面任意位置初始化音频系统');
                return;

            const currentWord = wordData[currentIndex].word;
            
            if ('speechSynthesis' in window) {
                const synth = window.speechSynthesis;
                const utterance = new SpeechSynthesisUtterance(currentWord);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                utterance.pitch = 1.0;
                utterance.volume = 1.0;
                
                const loadVoices = () => {
                    const voices = synth.getVoices();
                    const enUSVoice = voices.find(voice => voice.lang === 'en-US' && voice.name.includes('US'));
                    if (enUSVoice) utterance.voice = enUSVoice;
                    synth.speak(utterance);
                };
                
                if (synth.getVoices().length === 0) {
                    synth.onvoiceschanged = loadVoices;
                } else {
                    loadVoices();
                }
            } else {
                alert('语音功能不可用');
            }
        }

                if (!nextBtn.disabled) {
                    nextWord();
                    return;
                }
                
                switch(currentState) {
                    case 'word_input': checkAnswer(); break;
                    case 'sentence_input': showDictation(); break;
                    case 'dictation_input': checkDictation(); break;
                    case 'ready_for_next': nextWord(); break;
                }
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                e.preventDefault();
                
                const answerInput = document.getElementById('answerInput');
                const dictationInput = document.getElementById('dictationInput');
                
                if (!document.getElementById('sentenceExercise').classList.contains('hidden')) {
                    if (document.activeElement === answerInput) {
                        dictationInput.focus();
                    } else if (document.activeElement === dictationInput) {
                        answerInput.focus();
                    }
                } else if (!document.getElementById('dictationExercise').classList.contains('hidden')) {
                    if (document.activeElement === answerInput) {
                        dictationInput.focus();
                    } else if (document.activeElement === dictationInput) {
                        answerInput.focus();
                    }
                }
            }
        });

        // ========== 学习包管理功能 ==========
        
        function exportLearningPackage() {
            if (wordData.length === 0) {
                alert('请先加载Excel单词表！');
                return;
            }
            
            const taskName = prompt('请输入任务名称（如：机器人专业词汇）：', '机器人专业词汇');
            if (!taskName) return;
            
            const packageData = {
                version: "v1.0",
                createTime: new Date().toISOString(),
                taskInfo: {
                    taskName: taskName,
                    totalWords: wordData.length,
                    estimatedTime: Math.round(wordData.length * 2) + "分钟",
                    creator: userInfo.name || "管理员"
                },
                wordData: wordData,
                learningConfig: {
                    enableRecording: true,
                    enableDictation: true,
                    showRealtimeStats: true
                }
            };
            
            downloadJSON(packageData, `${taskName}_学习包.json`);
            alert('学习包已生成！\n\n请将此文件上传到钉钉群文件夹的"学习任务包"目录。');
        }
        
        function importLearningPackage() {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.json';
            fileInput.onchange = async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const packageData = JSON.parse(e.target.result);
                        loadPackageData(packageData);
                    } catch (error) {
                        alert('文件格式错误，请下载正确的学习包！');
                        console.error('解析错误:', error);
                    }
                };
                reader.readAsText(file);
            };
            fileInput.click();
        }
        
        function loadPackageData(packageData) {
            if (!packageData.wordData || !Array.isArray(packageData.wordData)) {
                alert('学习包格式错误：缺少单词数据！');
                return;
            }
            
            wordData = packageData.wordData;
            currentTaskInfo = packageData.taskInfo;
            isLearningPackageMode = true;
            
            if (packageData.taskInfo) {
                const taskInfoHTML = `
                    <div style="background: #e8f4f8; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #3498db;">
                        <h3 style="margin: 0 0 10px 0; color: #2c3e50;">📚 ${packageData.taskInfo.taskName}</h3>
                        <p style="margin: 5px 0; color: #555;"><strong>单词数量：</strong>${packageData.taskInfo.totalWords}个</p>
                        <p style="margin: 5px 0; color: #555;"><strong>预计用时：</strong>${packageData.taskInfo.estimatedTime}</p>
                        <p style="margin: 5px 0; color: #555;"><strong>创建时间：</strong>${new Date(packageData.createTime).toLocaleString()}</p>
                    </div>
                `;
                document.getElementById('status').innerHTML = taskInfoHTML;
            }
            
            learningRecords = [];
            currentIndex = 0;
            isCorrect = false;
            currentState = 'word_input';
            sentenceRecorded = false;
            initCurrentRecord();
            
            document.getElementById('progressText').textContent = `1/${wordData.length}`;
            document.getElementById('jumpInput').max = wordData.length;
            document.getElementById('exerciseContainer').classList.remove('hidden');

            startLearningTimer();

            showCurrentWord();
            
            // 保存到localStorage
            saveToLocalStorage();
            
            alert('学习包加载成功！\n\n任务：' + packageData.taskInfo.taskName + '\n单词数：' + wordData.length + '个\n\n点击"确定"开始学习。');
        }
        
        function downloadJSON(data, filename) {
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ========== 学习计时功能 ==========

        function startLearningTimer() {
            if (learningTimerInterval) {
                clearInterval(learningTimerInterval);
            }
            learningStartTime = Date.now();
            totalLearningTime = 0;

            learningTimerInterval = setInterval(() => {
                if (learningStartTime) {
                    const elapsed = Math.floor((Date.now() - learningStartTime) / 1000);
                    totalLearningTime = elapsed;
                }
            }, 1000);
        }

        function formatLearningTime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;

            if (hours > 0) {
                return `${hours}小时${minutes}分钟`;
            } else if (minutes > 0) {
                return `${minutes}分钟${secs}秒`;
            } else {
                return `${secs}秒`;
            }
        }

        // ========== 学习记录提交功能 ==========
        
        function submitLearningRecord() {
            const studentInfo = promptForStudentInfo();
            if (!studentInfo.name) {
                alert('请输入姓名才能提交学习记录！');
                return;
            }
            
            const learningRecord = {
                submitTime: new Date().toISOString(),
                taskInfo: currentTaskInfo || { taskName: "自定义学习", totalWords: wordData.length },
                studentInfo: studentInfo,
                learningProgress: {
                    completedWords: learningRecords.length,
                    totalWords: wordData.length,
                    totalTime: totalLearningTime,
                    completionRate: Math.round((learningRecords.length / wordData.length) * 100)
                },
                performance: {
                    accuracy: calculateAccuracy(),
                    correctCount: learningRecords.filter(r => r.wordCorrect).length,
                    incorrectCount: learningRecords.filter(r => !r.wordCorrect).length,
                    recordingCount: learningRecords.filter(r => r.sentenceRecorded).length,
                    dictationCount: learningRecords.filter(r => r.sentenceDictated).length
                },
                wordDetails: learningRecords.map((record, index) => ({
                    wordIndex: index,
                    word: record.word,
                    meaning: record.meaning,
                    isCorrect: record.wordCorrect,
                    attempts: record.wordAttempts,
                    recordingCompleted: record.sentenceRecorded,
                    dictationCompleted: record.sentenceDictated
                }))
            };
            
            const filename = `${studentInfo.name}_${studentInfo.department}_学习记录_${new Date().toLocaleDateString().replace(/\//g, '')}.json`;
            
            downloadJSON(learningRecord, filename);
            
            alert('✅ 学习记录已生成！\n\n文件名：' + filename + '\n\n请将此文件上传到钉钉群文件夹的"学习记录提交"目录。');
            
            if (confirm('是否查看本次学习统计？')) {
                showReport();
            }
        }
        
        function promptForStudentInfo() {
            const name = prompt('请输入您的姓名：', userInfo.name || '');
            const department = prompt('请输入您的部门：', userInfo.dept || '');
            const position = prompt('请输入您的岗位：', userInfo.position || '');
            
            return { name, department, position };
        }
        
        function calculateAccuracy() {
            if (learningRecords.length === 0) return 0;
            const correctCount = learningRecords.filter(r => r.wordCorrect).length;
            return Math.round((correctCount / learningRecords.length) * 100);
        }
        
        // ========== 管理员监控面板功能 ==========
        
        function showMonitoringDashboard() {
            document.getElementById('practiceContainer').classList.add('hidden');
            document.getElementById('reportContainer').classList.add('hidden');

            let dashboard = document.getElementById('monitoringDashboard');
            if (!dashboard) {
                dashboard = document.createElement('div');
                dashboard.id = 'monitoringDashboard';
                dashboard.className = 'report-container';
                dashboard.innerHTML = `
                    <div class="report-header">
                        <h2>学习情况监控面板</h2>
                        <p>管理员专用 · 实时监控学员学习进度</p>
                    </div>
                    
                    <div class="report-section">
                        <h3>快速统计</h3>
                        <div class="report-grid">
                            <div class="report-item">
                                <strong>已提交人数</strong>
                                <span id="monitorSubmittedCount">0</span>
                            </div>
                            <div class="report-item">
                                <strong>平均正确率</strong>
                                <span id="monitorAvgAccuracy">0%</span>
                            </div>
                            <div class="report-item">
                                <strong>平均学习时长</strong>
                                <span id="monitorAvgTime">0分钟</span>
                            </div>
                            <div class="report-item">
                                <strong>平均完成率</strong>
                                <span id="monitorAvgCompletion">0%</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="report-section">
                        <h3>操作说明</h3>
                        <ol style="margin-left: 20px; line-height: 1.8; color: #555;">
                            <li>学员将学习记录上传到钉钉群文件夹"学习记录提交"</li>
                            <li>管理员点击"加载记录文件"选择多个JSON文件</li>
                            <li>系统自动统计并显示学员学习情况</li>
                            <li>可导出完整的监控报告</li>
                        </ol>
                    </div>
                    
                    <div class="report-section">
                        <h3>学员学习记录</h3>
                        <div id="monitorRecordList" style="max-height: 400px; overflow-y: auto;">
                            <p style="text-align: center; color: #999; padding: 20px;">暂无学习记录，请先加载文件</p>
                        </div>
                    </div>
                    
                    <div class="report-buttons">
                        <button onclick="loadMonitoringRecords()">📁 加载记录文件</button>
                        <button class="export" onclick="exportMonitoringReport()">📊 导出监控报告</button>
                        <button onclick="hideMonitoringDashboard()">🔙 返回练习</button>
                    </div>
                `;
                
                document.body.appendChild(dashboard);
            } else {
                dashboard.classList.remove('hidden');
            }
        }
        
        function hideMonitoringDashboard() {
            document.getElementById('monitoringDashboard').classList.add('hidden');
            document.getElementById('practiceContainer').classList.remove('hidden');
        }
        
        function loadMonitoringRecords() {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.multiple = true;
            fileInput.accept = '.json';
            fileInput.onchange = function(e) {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                
                collectedRecords = [];
                let processedCount = 0;
                
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const record = JSON.parse(e.target.result);
                            if (record.studentInfo && record.learningProgress && record.performance) {
                                collectedRecords.push(record);
                            }
                        } catch (error) {
                            console.error('文件解析失败:', file.name, error);
                        }
                        
                        processedCount++;
                        if (processedCount === files.length) {
                            updateMonitoringDisplay();
                        }
                    };
                    reader.readAsText(file);
                });
            };
            fileInput.click();
        }
        
        function updateMonitoringDisplay() {
            if (collectedRecords.length === 0) {
                alert('未找到有效的学习记录文件！');
                return;
            }
            
            const submittedCount = collectedRecords.length;
            const avgAccuracy = Math.round(collectedRecords.reduce((sum, r) => sum + r.performance.accuracy, 0) / submittedCount);
            const avgTime = Math.round(collectedRecords.reduce((sum, r) => sum + r.learningProgress.totalTime, 0) / submittedCount / 60);
            const avgCompletion = Math.round(collectedRecords.reduce((sum, r) => sum + r.learningProgress.completionRate, 0) / submittedCount);
            
            document.getElementById('monitorSubmittedCount').textContent = submittedCount + '人';
            document.getElementById('monitorAvgAccuracy').textContent = avgAccuracy + '%';
            document.getElementById('monitorAvgTime').textContent = avgTime + '分钟';
            document.getElementById('monitorAvgCompletion').textContent = avgCompletion + '%';
            
            const recordList = document.getElementById('monitorRecordList');
            recordList.innerHTML = collectedRecords.map((record, index) => `
                <div style="background: #f9f9f9; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 3px solid ${record.performance.accuracy >= 80 ? '#27ae60' : record.performance.accuracy >= 60 ? '#f39c12' : '#e74c3c'};">
                    <h4 style="margin: 0 0 8px 0; color: #2c3e50;">${record.studentInfo.name} - ${record.studentInfo.department}</h4>
                    <div style="font-size: 13px; color: #555; line-height: 1.6;">
                        <p><strong>岗位：</strong>${record.studentInfo.position}</p>
                        <p><strong>进度：</strong>${record.learningProgress.completedWords}/${record.learningProgress.totalWords} (${record.learningProgress.completionRate}%)</p>
                        <p><strong>正确率：</strong><span style="color: ${record.performance.accuracy >= 80 ? '#27ae60' : record.performance.accuracy >= 60 ? '#f39c12' : '#e74c3c'}; font-weight: bold;">${record.performance.accuracy}%</span></p>
                        <p><strong>学习时长：</strong>${formatLearningTime(record.learningProgress.totalTime)}</p>
                        <p><strong>跟读完成：</strong>${record.performance.recordingCount}个 | <strong>默写完成：</strong>${record.performance.dictationCount}个</p>
                        <p><strong>提交时间：</strong>${new Date(record.submitTime).toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
            
            alert('成功加载 ' + collectedRecords.length + ' 条学习记录！');
        }
        
        function exportMonitoringReport() {
            if (collectedRecords.length === 0) {
                alert('请先加载学习记录文件！');
                return;
            }
            
            // 检查XLSX库是否已加载
            if (typeof XLSX === 'undefined') {
                alert('⚠️ Excel导出库未就绪\n\n请稍后重试');
                return;
            }
            
            const wb = XLSX.utils.book_new();
            
            const submittedCount = collectedRecords.length;
            const avgAccuracy = Math.round(collectedRecords.reduce((sum, r) => sum + r.performance.accuracy, 0) / submittedCount);
            const avgTime = Math.round(collectedRecords.reduce((sum, r) => sum + r.learningProgress.totalTime, 0) / submittedCount / 60);
            const avgCompletion = Math.round(collectedRecords.reduce((sum, r) => sum + r.learningProgress.completionRate, 0) / submittedCount);
            
            const summaryData = [
                ['学习监控报告'],
                [''],
                ['报告生成时间', new Date().toLocaleString()],
                [''],
                ['统计概览'],
                ['已提交人数', submittedCount + '人'],
                ['平均正确率', avgAccuracy + '%'],
                ['平均学习时长', avgTime + '分钟'],
                ['平均完成率', avgCompletion + '%'],
                [''],
                ['部门统计']
            ];
            
            const deptStats = {};
            collectedRecords.forEach(record => {
                const dept = record.studentInfo.department || '未知部门';
                if (!deptStats[dept]) {
                    deptStats[dept] = { count: 0, totalAccuracy: 0, totalTime: 0 };
                }
                deptStats[dept].count++;
                deptStats[dept].totalAccuracy += record.performance.accuracy;
                deptStats[dept].totalTime += record.learningProgress.totalTime;
            });
            
            Object.keys(deptStats).forEach(dept => {
                summaryData.push([
                    dept,
                    deptStats[dept].count + '人',
                    Math.round(deptStats[dept].totalAccuracy / deptStats[dept].count) + '%',
                    Math.round(deptStats[dept].totalTime / deptStats[dept].count / 60) + '分钟'
                ]);
            });
            
            const summaryWS = XLSX.utils.aoa_to_sheet(summaryData);
            XLSX.utils.book_append_sheet(wb, summaryWS, '统计概览');
            
            const detailData = [
                ['序号', '姓名', '部门', '岗位', '完成进度', '正确率', '学习时长', '跟读完成', '默写完成', '提交时间']
            ];
            
            collectedRecords.forEach((record, index) => {
                detailData.push([
                    index + 1,
                    record.studentInfo.name,
                    record.studentInfo.department,
                    record.studentInfo.position,
                    `${record.learningProgress.completedWords}/${record.learningProgress.totalWords} (${record.learningProgress.completionRate}%)`,
                    record.performance.accuracy + '%',
                    formatLearningTime(record.learningProgress.totalTime),
                    record.performance.recordingCount + '个',
                    record.performance.dictationCount + '个',
                    new Date(record.submitTime).toLocaleString()
                ]);
            });
            
            const detailWS = XLSX.utils.aoa_to_sheet(detailData);
            XLSX.utils.book_append_sheet(wb, detailWS, '详细记录');
            
            XLSX.writeFile(wb, `学习监控报告_${new Date().toLocaleDateString().replace(/\//g, '')}.xlsx`);
            
            alert('监控报告已导出！');
        }

        // ========== 下拉菜单控制 ==========

        function toggleDropdown(dropdownId) {
            const dropdown = document.getElementById(dropdownId);
            const allDropdowns = document.querySelectorAll('.dropdown-content');

            allDropdowns.forEach(d => {
                if (d.id !== dropdownId) {
                    d.classList.remove('show');
                }
            });

            dropdown.classList.toggle('show');
        }

        document.addEventListener('click', function(event) {
            const dropdowns = document.querySelectorAll('.nav-dropdown');
            dropdowns.forEach(dropdown => {
                if (!dropdown.contains(event.target)) {
                    const content = dropdown.querySelector('.dropdown-content');
                    if (content) {
                        content.classList.remove('show');
                    }
                }
            });
        });
    </script>
